<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Cart — Anaaj</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand"><div class="logo-icon">🌾</div>Anaaj</a>
  <ul class="navbar-links" id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="cart.html" class="active">Cart</a></li>
    <li><a href="profile.html">My Orders</a></li>
  </ul>
  <div class="navbar-actions">
    <a href="cart.html" class="cart-btn"><span>🛒</span> Cart<span class="cart-badge" id="cart-count" style="display:none">0</span></a>
  </div>
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="cart-container">
  <h1 style="font-size:1.6rem;font-weight:700;margin-bottom:1.5rem;padding-top:1rem">🛒 Shopping Cart</h1>

  <div id="cart-loading" class="spinner"></div>
  <div id="cart-empty" style="display:none;text-align:center;padding:4rem;color:var(--text-muted)">
    <div style="font-size:4rem;margin-bottom:1rem">🛒</div>
    <div style="font-size:1.1rem;margin-bottom:1.5rem">Your cart is empty!</div>
    <a href="shop.html" class="btn btn-primary">Browse Products</a>
  </div>
  <div id="not-logged" style="display:none;text-align:center;padding:4rem;color:var(--text-muted)">
    <div style="font-size:3rem;margin-bottom:1rem">🔐</div>
    <div style="margin-bottom:1rem">Please log in to view your cart.</div>
    <a href="login.html?return=/pages/cart.html" class="btn btn-primary">Login</a>
  </div>

  <div id="cart-content" style="display:none">
    <div id="cart-items"></div>
    <div class="cart-summary glass" style="padding:1.25rem;margin-top:1rem">
      <div class="summary-row">
        <span style="color:var(--text-secondary)">Subtotal</span>
        <span id="cart-subtotal">₹0.00</span>
      </div>
      <div class="summary-row">
        <span style="color:var(--text-secondary)">Delivery</span>
        <span style="color:var(--green)">FREE</span>
      </div>
      <div class="summary-row summary-total">
        <span>Total</span>
        <span id="cart-total" style="font-size:1.2rem;color:var(--blue)">₹0.00</span>
      </div>
      <a href="checkout.html" class="btn btn-primary btn-block btn-lg" style="margin-top:1rem" id="checkout-btn">Proceed to Checkout →</a>
      <a href="shop.html" class="btn btn-glass btn-block mt-1">← Continue Shopping</a>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
async function loadCart() {
  try {
    const authRes = await fetch(API.profile);
    if (!authRes.ok) {
      document.getElementById('cart-loading').style.display = 'none';
      document.getElementById('not-logged').style.display = 'block';
      return;
    }

    const res  = await fetch(API.cart);
    const data = await res.json();
    document.getElementById('cart-loading').style.display = 'none';

    if (!data.items || !data.items.length) {
      document.getElementById('cart-empty').style.display = 'block';
      return;
    }

    renderCart(data);

  } catch (e) {
    document.getElementById('cart-loading').style.display = 'none';
    document.getElementById('cart-empty').style.display = 'block';
  }
}

function renderCart(data) {
  const content = document.getElementById('cart-content');
  const items   = document.getElementById('cart-items');
  content.style.display = 'block';

  items.innerHTML = data.items.map(item => `
    <div class="cart-item-row" data-id="${item.productId}">
      <div class="cart-thumb">
        ${item.imageUrl
          ? `<img src="${CTX}/images/${item.imageUrl}" alt="${item.productName}">`
          : '🌾'}
      </div>
      <div>
        <div class="cart-item-name">${item.productName}</div>
        <div class="cart-item-price">₹${Number(item.unitPrice).toFixed(2)} / ${item.unit || 'kg'}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="updateQty(${item.productId}, ${item.quantity - 1})">−</button>
        <span class="qty-val">${item.quantity}</span>
        <button class="qty-btn" onclick="updateQty(${item.productId}, ${item.quantity + 1})">+</button>
      </div>
      <div class="cart-line-total">₹${Number(item.lineTotal || item.unitPrice * item.quantity).toFixed(2)}</div>
      <button class="remove-item-btn" onclick="removeItem(${item.productId})" title="Remove">✕</button>
    </div>`).join('');

  document.getElementById('cart-subtotal').textContent = `₹${Number(data.total).toFixed(2)}`;
  document.getElementById('cart-total').textContent    = `₹${Number(data.total).toFixed(2)}`;

  const badge = document.getElementById('cart-count');
  if (badge) { badge.textContent = data.count || 0; badge.style.display = (data.count > 0) ? 'flex' : 'none'; }
}

async function updateQty(productId, qty) {
  await fetch(`${API.cart}?action=update&productId=${productId}&qty=${qty}`, { method: 'POST' });
  loadCart();
}

async function removeItem(productId) {
  await fetch(`${API.cart}?action=remove&productId=${productId}`, { method: 'POST' });
  showToast('Item removed from cart', 'info');
  loadCart();
}

loadCart();
</script>
</body>
</html>
