<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — Anaaj</title>
  <meta name="description" content="Log in to your Anaaj account to shop for grains and staples."/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <div class="logo-icon">🌾</div>Anaaj
  </a>
</nav>

<div class="form-page">
  <div class="form-card">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2.5rem;margin-bottom:0.5rem">🌾</div>
      <div class="form-title">Welcome back</div>
      <div class="form-subtitle">Log in to your Anaaj account</div>
    </div>

    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <form id="login-form" action="../login" method="POST" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Your password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">→ Login</button>
    </form>

    <div class="form-hint">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
    <div class="form-hint" style="margin-top:0.5rem">
      <span style="color:var(--text-muted);font-size:0.75rem">
        Demo admin: admin@anaaj.com / admin123
      </span>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
// Show URL error params
const params = new URLSearchParams(window.location.search);
const errMap = {
  invalid : 'Invalid email or password. Please try again.',
  empty   : 'Please enter your email and password.',
  server  : 'Server error. Please try again later.',
};
const err = params.get('error');
if (err && errMap[err]) {
  const el = document.getElementById('error-msg');
  el.textContent = errMap[err];
  el.classList.add('show');
}

// Client-side validation
document.getElementById('login-form').addEventListener('submit', e => {
  const email = document.getElementById('email').value.trim();
  const pwd   = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('show');

  if (!email || !pwd) {
    e.preventDefault();
    errEl.textContent = 'Please fill in all fields.';
    errEl.classList.add('show');
    return;
  }
  document.getElementById('login-btn').textContent = 'Logging in…';
  document.getElementById('login-btn').disabled = true;
});
</script>
</body>
</html>
