<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Order Placed! — Anaaj</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand"><div class="logo-icon">🌾</div>Anaaj</a>
  <div class="navbar-actions">
    <a href="profile.html" class="btn btn-glass btn-sm">My Orders</a>
  </div>
</nav>

<div class="success-page">
  <div class="success-icon">✅</div>
  <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:0.5rem">Order Placed!</h1>
  <p style="color:var(--text-secondary);margin-bottom:0.5rem">
    Thank you for your purchase. Your grain order is being prepared.
  </p>
  <div id="order-id-display" style="margin:1rem 0;padding:0.75rem 1.5rem;background:rgba(79,142,247,0.1);border-radius:var(--radius-sm);border:1px solid rgba(79,142,247,0.2);font-size:0.85rem">
    Order ID: <strong style="color:var(--blue)" id="order-id">—</strong>
  </div>

  <!-- Order Timeline -->
  <div class="order-timeline" style="margin:2rem 0">
    <div class="timeline-step current">
      <div class="step-dot">✓</div>
      <div class="step-label">Confirmed</div>
    </div>
    <div class="timeline-step">
      <div class="step-dot">📦</div>
      <div class="step-label">Packed</div>
    </div>
    <div class="timeline-step">
      <div class="step-dot">🚚</div>
      <div class="step-label">Shipped</div>
    </div>
    <div class="timeline-step">
      <div class="step-dot">🏠</div>
      <div class="step-label">Delivered</div>
    </div>
  </div>

  <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem">
    <a href="profile.html" class="btn btn-primary">Track Order →</a>
    <a href="shop.html" class="btn btn-glass">Continue Shopping</a>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const orderId = params.get('orderId');
if (orderId) document.getElementById('order-id').textContent = '#' + orderId;

// Confetti-style celebration
function launchCelebration() {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden';
  document.body.appendChild(container);
  const emojis = ['🌾','🫘','🍚','✅','⭐','🎉'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.style.cssText = `
      position:absolute;font-size:${20+Math.random()*20}px;
      left:${Math.random()*100}vw;top:-40px;
      animation:fall ${2+Math.random()*2}s ease-in forwards;
      animation-delay:${Math.random()*1.5}s;
    `;
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    container.appendChild(el);
  }
  const style = document.createElement('style');
  style.textContent = `
    @keyframes fall {
      to { transform: translateY(105vh) rotate(360deg); opacity: 0; }
    }`;
  document.head.appendChild(style);
  setTimeout(() => container.remove(), 4000);
}
setTimeout(launchCelebration, 300);
</script>
</body>
</html>
