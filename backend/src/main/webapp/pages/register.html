<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Register — Anaaj</title>
  <meta name="description" content="Create your Anaaj account and start shopping for premium grains."/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <div class="logo-icon">🌾</div>Anaaj
  </a>
</nav>

<div class="form-page" style="padding:5rem 1rem">
  <div class="form-card" style="max-width:480px">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2.5rem;margin-bottom:0.5rem">🌾</div>
      <div class="form-title">Create Account</div>
      <div class="form-subtitle">Join Anaaj — Farm-fresh grains at your doorstep</div>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <form id="register-form" action="../register" method="POST" novalidate>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label" for="name">Full Name *</label>
          <input class="form-input" type="text" id="name" name="name" placeholder="Ravi Kumar" required/>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label" for="phone">Phone</label>
          <input class="form-input" type="tel" id="phone" name="phone" placeholder="9876543210"/>
        </div>
      </div>
      <div class="form-group mt-2">
        <label class="form-label" for="email">Email Address *</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password * <span style="color:var(--text-muted);font-weight:400">(min. 6 chars)</span></label>
        <input class="form-input" type="password" id="password" name="password" placeholder="Create a strong password" required autocomplete="new-password"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="address">Delivery Address</label>
        <textarea class="form-input" id="address" name="address" placeholder="Door no, Street, City, State — PIN"></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="reg-btn">Create Account →</button>
    </form>

    <div class="form-hint">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const errMap = {
  empty     : 'Please fill in all required fields.',
  shortpwd  : 'Password must be at least 6 characters.',
  duplicate : 'An account with this email already exists.',
  server    : 'Server error. Please try again later.',
};
const err = params.get('error');
if (err && errMap[err]) {
  const el = document.getElementById('error-msg');
  el.textContent = errMap[err];
  el.classList.add('show');
}

document.getElementById('register-form').addEventListener('submit', e => {
  const name  = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pwd   = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('show');

  if (!name || !email || !pwd) {
    e.preventDefault(); errEl.textContent = 'Name, email, and password are required.'; errEl.classList.add('show'); return;
  }
  if (pwd.length < 6) {
    e.preventDefault(); errEl.textContent = 'Password must be at least 6 characters.'; errEl.classList.add('show'); return;
  }
  const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRx.test(email)) {
    e.preventDefault(); errEl.textContent = 'Please enter a valid email address.'; errEl.classList.add('show'); return;
  }

  document.getElementById('reg-btn').textContent = 'Creating account…';
  document.getElementById('reg-btn').disabled = true;
});
</script>
</body>
</html>
