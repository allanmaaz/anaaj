<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — Orders | Anaaj</title>
  <link rel="stylesheet" href="../../css/style.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="logo">🌾 Anaaj Admin</div>
    <ul class="admin-nav">
      <li><a href="products.html">📦 Products</a></li>
      <li><a href="orders.html" class="active">🧾 Orders</a></li>
      <li><a href="../index.html">🏠 Home</a></li>
      <li><a href="../shop.html">🛍️ Shop</a></li>
      <li><a href="../../logout" style="color:var(--rose)">⏻ Logout</a></li>
    </ul>
  </aside>

  <main class="admin-content">
    <div class="admin-page-title">🧾 All Orders</div>

    <!-- Filter bar -->
    <div class="filter-row" style="margin-bottom:1.5rem">
      <button class="filter-chip active" onclick="filterOrders('all',this)">All</button>
      <button class="filter-chip" onclick="filterOrders('Confirmed',this)">Confirmed</button>
      <button class="filter-chip" onclick="filterOrders('Packed',this)">Packed</button>
      <button class="filter-chip" onclick="filterOrders('Shipped',this)">Shipped</button>
      <button class="filter-chip" onclick="filterOrders('Delivered',this)">Delivered</button>
    </div>

    <div class="data-table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Order #</th><th>Customer</th><th>Amount</th><th>Status</th>
            <th>Date</th><th>Delivery Address</th><th>Update Status</th>
          </tr>
        </thead>
        <tbody id="orders-tbody">
          <tr><td colspan="7" style="text-align:center;padding:3rem">
            <div class="spinner" style="margin:0 auto"></div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="../../js/main.js"></script>
<script>
let allOrders  = [];
let filterVal  = 'all';

async function guardAdmin() {
  try {
    const res = await fetch(API.profile);
    if (!res.ok) { window.location.href = '../login.html'; return; }
    const user = await res.json();
    if (user.role !== 'admin') window.location.href = '../index.html';
  } catch (_) { window.location.href = '../login.html'; }
}

async function loadOrders() {
  try {
    const res = await fetch(`${API.admin}?action=orders`);
    allOrders = await res.json();
    renderOrders();
  } catch (e) {
    document.getElementById('orders-tbody').innerHTML =
      '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--rose)">Failed to load orders.</td></tr>';
  }
}

function filterOrders(status, btn) {
  filterVal = status;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const orders = filterVal === 'all' ? allOrders : allOrders.filter(o => o.status === filterVal);
  const tbody  = document.getElementById('orders-tbody');

  if (!orders.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted)">No orders found.</td></tr>';
    return;
  }

  tbody.innerHTML = orders.map(order => `
    <tr id="order-row-${order.id}">
      <td><strong>#${order.id}</strong></td>
      <td>${order.userName || '—'}</td>
      <td>₹${Number(order.totalAmount).toFixed(2)}</td>
      <td><span class="status-badge status-${order.status}" id="badge-${order.id}">${order.status}</span></td>
      <td style="white-space:nowrap;font-size:0.8rem">${new Date(order.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</td>
      <td style="font-size:0.8rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
          title="${order.deliveryAddress || ''}">${order.deliveryAddress ? order.deliveryAddress.slice(0,40) + '…' : '—'}</td>
      <td>
        <select class="status-select" onchange="updateStatus(${order.id}, this)">
          ${['Confirmed','Packed','Shipped','Delivered'].map(s =>
            `<option value="${s}" ${s === order.status ? 'selected' : ''}>${s}</option>`
          ).join('')}
        </select>
      </td>
    </tr>`).join('');
}

async function updateStatus(orderId, selectEl) {
  const status = selectEl.value;
  try {
    const fd = new FormData();
    fd.append('action',  'updateOrderStatus');
    fd.append('orderId', orderId);
    fd.append('status',  status);

    const res = await fetch(API.admin, { method: 'POST', body: fd });
    const data = await res.json();

    if (data.success) {
      showToast(`Order #${orderId} → ${status}`, 'success');
      // Update badge inline
      const badge = document.getElementById(`badge-${orderId}`);
      if (badge) {
        badge.className = `status-badge status-${status}`;
        badge.textContent = status;
      }
      // Update local data
      const order = allOrders.find(o => o.id === orderId);
      if (order) order.status = status;
    } else {
      showToast(data.error || 'Update failed', 'error');
    }
  } catch (e) {
    showToast('Network error', 'error');
  }
}

guardAdmin().then(loadOrders);
</script>
</body>
</html>
