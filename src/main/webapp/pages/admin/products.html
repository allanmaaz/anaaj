<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — Products | Anaaj</title>
  <link rel="stylesheet" href="../../css/style.css"/>
</head>
<body>
<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="logo">🌾 Anaaj Admin</div>
    <ul class="admin-nav">
      <li><a href="products.html" class="active" id="nav-products">📦 Products</a></li>
      <li><a href="orders.html" id="nav-orders">🧾 Orders</a></li>
      <li><a href="../index.html">🏠 Home</a></li>
      <li><a href="../shop.html">🛍️ Shop</a></li>
      <li><a href="../../logout" style="color:var(--rose)">⏻ Logout</a></li>
    </ul>
  </aside>

  <!-- Main content -->
  <main class="admin-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
      <div class="admin-page-title" style="margin-bottom:0">📦 Products</div>
      <button class="btn btn-primary" id="add-product-btn" onclick="openModal()">+ Add Product</button>
    </div>

    <!-- Stats -->
    <div class="stat-cards" id="stat-cards">
      <div class="stat-card"><div class="stat-card-val" id="stat-orders">—</div><div class="stat-card-lbl">Total Orders</div></div>
      <div class="stat-card"><div class="stat-card-val" id="stat-revenue">—</div><div class="stat-card-lbl">Total Revenue</div></div>
    </div>

    <!-- Products table -->
    <div class="data-table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Category</th><th>Price</th>
            <th>Stock</th><th>Origin</th><th>Freshness</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="products-tbody">
          <tr><td colspan="8" style="text-align:center;padding:3rem;color:var(--text-muted)">
            <div class="spinner" style="margin:0 auto"></div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Add/Edit Product Modal -->
<div class="modal-overlay" id="product-modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add Product</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <input type="hidden" id="modal-product-id"/>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
      <div class="form-group" style="margin:0">
        <label class="form-label">Product Name *</label>
        <input class="form-input" id="f-name" placeholder="Basmati Rice"/>
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">Price (₹) *</label>
        <input class="form-input" type="number" id="f-price" placeholder="85.00" step="0.01"/>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-top:0.75rem">
      <div class="form-group" style="margin:0">
        <label class="form-label">Unit</label>
        <select class="form-input status-select" id="f-unit" style="width:100%">
          <option value="kg">kg</option><option value="500g">500g</option>
          <option value="1kg">1kg</option><option value="5kg">5kg</option><option value="litre">litre</option>
        </select>
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">Stock (kg)</label>
        <input class="form-input" type="number" id="f-stock" placeholder="100"/>
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">Category ID</label>
        <input class="form-input" type="number" id="f-cat" placeholder="1"/>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.75rem">
      <div class="form-group" style="margin:0">
        <label class="form-label">Origin State</label>
        <input class="form-input" id="f-state" placeholder="Punjab"/>
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">Freshness (0–100)</label>
        <input class="form-input" type="number" id="f-freshness" value="90" min="0" max="100"/>
      </div>
    </div>
    <div style="margin-top:0.75rem">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="f-desc" rows="2" placeholder="Product description…"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:0.75rem;margin-top:0.75rem;align-items:center">
      <div class="form-group" style="margin:0">
        <label class="form-label">Image filename (in /images/)</label>
        <input class="form-input" id="f-image" placeholder="rice-basmati.jpg"/>
      </div>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.8rem;color:var(--text-secondary);white-space:nowrap;margin-top:1.1rem">
        <input type="checkbox" id="f-organic" style="accent-color:var(--green)"/> 🌿 Organic
      </label>
    </div>
    <div id="modal-error" class="error-msg" style="margin-top:0.75rem"></div>
    <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.25rem">
      <button class="btn btn-glass" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script>
let editProductId = null;

// ── Auth guard ───────────────────────────────────────────────────
async function guardAdmin() {
  try {
    const res = await fetch(API.profile);
    if (!res.ok) { window.location.href = '../login.html'; return; }
    const user = await res.json();
    if (user.role !== 'admin') { window.location.href = '../index.html'; }
  } catch (_) { window.location.href = '../login.html'; }
}

// ── Load stats ───────────────────────────────────────────────────
async function loadStats() {
  try {
    const res  = await fetch(`${API.admin}?action=stats`);
    const data = await res.json();
    document.getElementById('stat-orders').textContent  = data.totalOrders  || 0;
    document.getElementById('stat-revenue').textContent = data.totalRevenue ? `₹${Number(data.totalRevenue).toFixed(2)}` : '₹0.00';
  } catch (_) {}
}

// ── Load products ────────────────────────────────────────────────
async function loadProducts() {
  try {
    const res  = await fetch(`${API.admin}?action=products`);
    const data = await res.json();
    const tbody = document.getElementById('products-tbody');
    if (!data || !data.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:3rem;color:var(--text-muted)">No products yet. Add one!</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(p => `
      <tr>
        <td>${p.id}</td>
        <td><strong>${p.name}</strong></td>
        <td>${p.categoryName || p.categoryId}</td>
        <td>₹${Number(p.price).toFixed(2)}</td>
        <td>${p.stock} ${p.unit}</td>
        <td>${p.originState || '—'}</td>
        <td>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="freshness-bar" style="width:60px;height:4px;border-radius:2px;background:rgba(255,255,255,0.08)">
              <div class="freshness-fill" style="width:${p.freshnessScore}%;height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--cyan))"></div>
            </div>
            <span style="font-size:0.75rem;color:var(--green)">${p.freshnessScore}</span>
          </div>
        </td>
        <td>
          <div class="action-btns">
            <button class="btn btn-glass btn-sm" onclick='openEditModal(${JSON.stringify(p)})'>✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id}, '${p.name}')">🗑️</button>
          </div>
        </td>
      </tr>`).join('');
  } catch (e) {
    showToast('Failed to load products: ' + e.message, 'error');
  }
}

// ── Modal helpers ────────────────────────────────────────────────
function openModal() {
  editProductId = null;
  clearForm();
  document.getElementById('modal-title').textContent = 'Add Product';
  document.getElementById('modal-save-btn').textContent = 'Add Product';
  document.getElementById('product-modal').classList.add('open');
}

function closeModal() { document.getElementById('product-modal').classList.remove('open'); }

function openEditModal(product) {
  editProductId = product.id;
  document.getElementById('f-name').value     = product.name;
  document.getElementById('f-price').value    = product.price;
  document.getElementById('f-unit').value     = product.unit;
  document.getElementById('f-stock').value    = product.stock;
  document.getElementById('f-cat').value      = product.categoryId;
  document.getElementById('f-state').value    = product.originState || '';
  document.getElementById('f-freshness').value= product.freshnessScore;
  document.getElementById('f-desc').value     = product.description || '';
  document.getElementById('f-image').value    = product.imageUrl || '';
  document.getElementById('f-organic').checked= product.isOrganic || product.organic;
  document.getElementById('modal-title').textContent = 'Edit Product';
  document.getElementById('modal-save-btn').textContent = 'Save Changes';
  document.getElementById('product-modal').classList.add('open');
}

function clearForm() {
  ['f-name','f-price','f-stock','f-cat','f-state','f-desc','f-image'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-freshness').value = 90;
  document.getElementById('f-unit').value      = 'kg';
  document.getElementById('f-organic').checked = false;
  document.getElementById('modal-error').classList.remove('show');
}

// ── Save product ─────────────────────────────────────────────────
async function saveProduct() {
  const name  = document.getElementById('f-name').value.trim();
  const price = document.getElementById('f-price').value;
  const errEl = document.getElementById('modal-error');
  errEl.classList.remove('show');

  if (!name || !price) {
    errEl.textContent = 'Name and price are required.'; errEl.classList.add('show'); return;
  }

  const fd = new FormData();
  fd.append('action',       editProductId ? 'editProduct' : 'addProduct');
  if (editProductId) fd.append('id', editProductId);
  fd.append('name',         name);
  fd.append('price',        price);
  fd.append('unit',         document.getElementById('f-unit').value);
  fd.append('stock',        document.getElementById('f-stock').value || 0);
  fd.append('categoryId',   document.getElementById('f-cat').value || 1);
  fd.append('originState',  document.getElementById('f-state').value);
  fd.append('freshnessScore', document.getElementById('f-freshness').value || 90);
  fd.append('description',  document.getElementById('f-desc').value);
  fd.append('imageUrl',     document.getElementById('f-image').value);
  fd.append('isOrganic',    document.getElementById('f-organic').checked);

  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    const res = await fetch(API.admin, { method: 'POST', body: fd });
    const data = await res.json();
    if (data.success) {
      showToast(editProductId ? 'Product updated!' : 'Product added!', 'success');
      closeModal(); loadProducts();
    } else {
      errEl.textContent = data.error || 'Save failed.'; errEl.classList.add('show');
    }
  } catch (e) {
    errEl.textContent = 'Network error.'; errEl.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = editProductId ? 'Save Changes' : 'Add Product';
  }
}

// ── Delete product ───────────────────────────────────────────────
async function deleteProduct(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    const fd = new FormData();
    fd.append('action', 'deleteProduct'); fd.append('id', id);
    const res = await fetch(API.admin, { method: 'POST', body: fd });
    const data = await res.json();
    if (data.success) { showToast('Product deleted!', 'info'); loadProducts(); }
    else showToast(data.error || 'Delete failed', 'error');
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

// Close modal on overlay click
document.getElementById('product-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

guardAdmin().then(() => { loadStats(); loadProducts(); });
</script>
</body>
</html>
