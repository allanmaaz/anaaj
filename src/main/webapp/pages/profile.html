<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Profile — Anaaj</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand"><div class="logo-icon">🌾</div>Anaaj</a>
  <ul class="navbar-links" id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="cart.html">Cart</a></li>
    <li><a href="profile.html" class="active">My Orders</a></li>
  </ul>
  <div class="navbar-actions">
    <a href="cart.html" class="cart-btn"><span>🛒</span><span class="cart-badge" id="cart-count" style="display:none">0</span></a>
    <a href="../logout" class="btn btn-glass btn-sm">Logout</a>
  </div>
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="section" style="padding-top:1.5rem">
  <div id="profile-loading" class="spinner"></div>
  <div id="not-logged" style="display:none;text-align:center;padding:4rem;color:var(--text-muted)">
    <div style="font-size:3rem;margin-bottom:1rem">🔐</div>
    <div style="margin-bottom:1rem">Please log in to view your profile.</div>
    <a href="login.html" class="btn btn-primary">Login</a>
  </div>

  <div id="profile-content" class="profile-layout" style="display:none">
    <!-- Left: Profile Card -->
    <div>
      <div class="profile-card">
        <div class="profile-avatar" id="profile-avatar">?</div>
        <div class="profile-name" id="profile-name">—</div>
        <div class="profile-email" id="profile-email">—</div>
        <div class="profile-role-badge" id="profile-role">user</div>
        <div style="margin-top:1.5rem;width:100%">
          <button class="btn btn-glass btn-block" onclick="toggleEditForm()">✏️ Edit Profile</button>
        </div>
      </div>

      <!-- Edit Profile Form -->
      <div id="edit-form" class="glass" style="margin-top:1rem;padding:1.25rem;display:none">
        <div style="font-weight:600;margin-bottom:1rem;font-size:0.9rem">Edit Profile</div>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" type="text" id="edit-name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" type="tel" id="edit-phone"/>
        </div>
        <div class="form-group">
          <label class="form-label">Address</label>
          <textarea class="form-input" id="edit-address" rows="3"></textarea>
        </div>
        <button class="btn btn-primary btn-block" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>

    <!-- Right: Order History -->
    <div>
      <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:1.25rem">📦 Order History</h2>
      <div id="orders-loading" class="spinner" style="margin:2rem 0"></div>
      <div id="orders-empty" style="display:none;color:var(--text-muted);text-align:center;padding:3rem">
        <div style="font-size:3rem;margin-bottom:1rem">📭</div>
        No orders yet. <a href="shop.html" class="text-blue">Shop now!</a>
      </div>
      <div id="orders-list"></div>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
let userData = null;

const STEP_ICONS  = ['✓','📦','🚚','🏠'];
const STATUS_STEPS = { Confirmed:0, Packed:1, Shipped:2, Delivered:3 };

async function loadProfile() {
  try {
    const res = await fetch(API.profile);
    document.getElementById('profile-loading').style.display = 'none';

    if (!res.ok) {
      document.getElementById('not-logged').style.display = 'block';
      return;
    }

    userData = await res.json();
    document.getElementById('profile-avatar').textContent = userData.name[0].toUpperCase();
    document.getElementById('profile-name').textContent   = userData.name;
    document.getElementById('profile-email').textContent  = userData.email;
    document.getElementById('profile-role').textContent   = userData.role;
    document.getElementById('edit-name').value    = userData.name || '';
    document.getElementById('edit-phone').value   = userData.phone || '';
    document.getElementById('edit-address').value = userData.address || '';

    document.getElementById('profile-content').style.display = 'grid';
    loadOrders();

  } catch (e) {
    document.getElementById('profile-loading').style.display = 'none';
    document.getElementById('not-logged').style.display = 'block';
  }
}

function toggleEditForm() {
  const f = document.getElementById('edit-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

async function saveProfile() {
  const fd = new FormData();
  fd.append('name',    document.getElementById('edit-name').value.trim());
  fd.append('phone',   document.getElementById('edit-phone').value.trim());
  fd.append('address', document.getElementById('edit-address').value.trim());

  try {
    const res = await fetch(API.profile, { method: 'POST', body: fd });
    const data = await res.json();
    if (data.success) {
      showToast('Profile updated!', 'success');
      document.getElementById('profile-name').textContent = fd.get('name');
      document.getElementById('edit-form').style.display = 'none';
    } else {
      showToast(data.error || 'Failed to update', 'error');
    }
  } catch (e) {
    showToast('Network error', 'error');
  }
}

async function loadOrders() {
  try {
    const res  = await fetch(API.orders);
    const data = await res.json();
    document.getElementById('orders-loading').style.display = 'none';

    if (!data || !data.length) {
      document.getElementById('orders-empty').style.display = 'block';
      return;
    }

    document.getElementById('orders-list').innerHTML = data.map(order => {
      const step = STATUS_STEPS[order.status] || 0;
      return `
        <div class="glass" style="padding:1.25rem;margin-bottom:1rem">
          <div class="flex-between" style="margin-bottom:0.5rem">
            <div>
              <span style="font-weight:700">#${order.id}</span>
              <span class="status-badge status-${order.status}" style="margin-left:0.5rem">${order.status}</span>
            </div>
            <span style="font-size:0.8rem;color:var(--text-muted)">${new Date(order.createdAt).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'})}</span>
          </div>
          <div class="order-timeline" style="margin:1rem 0">
            ${['Confirmed','Packed','Shipped','Delivered'].map((s, i) => `
              <div class="timeline-step ${i < step ? 'done' : ''} ${i === step ? 'current' : ''}">
                <div class="step-dot">${STEP_ICONS[i]}</div>
                <div class="step-label">${s}</div>
              </div>`).join('')}
          </div>
          <div class="flex-between" style="font-size:0.85rem;padding-top:0.5rem;border-top:0.5px solid rgba(255,255,255,0.07)">
            <span style="color:var(--text-secondary)">Total: <strong style="color:var(--text-primary)">₹${Number(order.totalAmount).toFixed(2)}</strong></span>
            <span style="color:var(--text-muted);font-size:0.78rem">${order.deliveryAddress ? order.deliveryAddress.slice(0,60) + (order.deliveryAddress.length > 60 ? '…' : '') : ''}</span>
          </div>
        </div>`;
    }).join('');

  } catch (e) {
    document.getElementById('orders-loading').style.display = 'none';
    document.getElementById('orders-empty').style.display = 'block';
  }
}

loadProfile();
</script>
</body>
</html>
